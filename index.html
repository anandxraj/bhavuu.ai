<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Bhavya 🍉 — Apna AI</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- API key setup modal -->
  <div id="setupModal" class="modal-overlay">
    <div class="modal">
      <div class="modal-seed">🖤</div>
      <h2>Setup, ek baar ka kaam</h2>
      <p>Apni Google Gemini API key daal do — ye sirf tumhare browser mein (localStorage) save hogi, kahi aur nahi jaayegi.</p>
      <input type="password" id="apiKeyInput" placeholder="AIza..." autocomplete="off" />
      <button id="saveKeyBtn">Chalo shuru karein 🍉</button>
      <p class="modal-hint">Key nahi hai? <a href="https://aistudio.google.com/apikey" target="_blank" rel="noopener">aistudio.google.com</a> se bana lo.</p>
    </div>
  </div>

  <div class="app-shell">

    <!-- Sidebar -->
    <aside id="sidebar" class="sidebar">
      <div class="sidebar-top">
        <button id="newChatBtn" class="new-chat-btn">
          <span class="plus">+</span> Nayi Chat
        </button>
      </div>

      <div class="sidebar-history" id="historyList"></div>

      <div class="sidebar-profile" id="profileBtn">
        <div class="profile-avatar">🐱</div>
        <div class="profile-info">
          <div class="profile-name">Bhavya Gupta</div>
          <div class="profile-sub">New Delhi 🍉</div>
        </div>
        <button id="settingsBtn" class="settings-icon" title="Settings">⚙️</button>
      </div>
    </aside>

    <div id="sidebarOverlay" class="sidebar-overlay"></div>

    <!-- Main chat -->
    <div class="app">
      <header class="chat-header">
        <button id="menuBtn" class="menu-btn" aria-label="Menu">☰</button>
        <div class="avatar">🐱</div>
        <div class="header-text">
          <h1>Bhavya ke liye <span>❤</span></h1>
          <p id="statusLine">kal se tumhare bare mein soch rahi thi 🍉</p>
        </div>
        <button id="resetBtn" title="Is chat ko delete karo">🗑</button>
      </header>

      <main id="chatWindow" class="chat-window"></main>

      <form id="chatForm" class="chat-input-bar">
        <input type="text" id="userInput" placeholder="Kuch bhi likho, Bhavya..." autocomplete="off" />
        <button type="submit" id="sendBtn" aria-label="Send">
          <span class="paw">🐾</span>
        </button>
      </form>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
